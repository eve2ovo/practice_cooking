          \n    # 2. 人数清洗\n    try:\n        normalized_servings = int(round(float(servings)))\n\
          \    except:\n        normalized_servings = 2\n    if normalized_servings\
          \ < 1:\n        normalized_servings = 1\n\n    # 3. 口味清洗\n    normalized_taste\
          \ = (taste or \"\").strip()\n    if not normalized_taste:\n        normalized_taste\
          \ = \"家常\"\n\n    # 4. 食材拆分\n    raw_ingredients = (availableIngredients\
          \ or \"\").strip()\n    if raw_ingredients:\n        ingredient_list = [\n\
          \            item.strip() for item in re.split(r\"[,，、;；\\n]+\", raw_ingredients)\n\
          \            if item.strip()\n        ]\n    else:\n        ingredient_list\
          \ = []\n\n    ingredient_text = \"、\".join(ingredient_list) if ingredient_list\
          \ else \"无明确现有食材\"\n\n    # 5. 检索查询词\n    retrieval_query = f\"{normalized_dish_name}\
          \ {normalized_taste} 做法 食材 配比 火候 时间\"\n\n    return {\n        \"normalizedDishName\"\
          : normalized_dish_name,\n        \"normalizedServings\": normalized_servings,\n\
          \        \"normalizedTaste\": normalized_taste,\n        \"ingredientList\"\
          : ingredient_list,\n        \"ingredientText\": ingredient_text,\n     \
          \   \"retrievalQuery\": retrieval_query\n    }"
