    - data:
        code: "def main(text, normalizedServings):\n    import json\n\n    # 解析 JSON\n\
          \    try:\n        data = json.loads(text)\n    except:\n        data =\
          \ {\n            \"dishName\": \"\",\n            \"description\": \"生成失败，请重试\"\
          ,\n            \"servingSize\": int(normalizedServings) if normalizedServings\
          \ else 2,\n            \"difficulty\": \"EASY\",\n            \"totalDuration\"\
          : 0,\n            \"ingredients\": [],\n            \"prepTips\": [],\n\
          \            \"timelineSteps\": []\n        }\n\n    # 保底字段\n    data.setdefault(\"\
          dishName\", \"\")\n    data.setdefault(\"description\", \"\")\n    data[\"\
          servingSize\"] = int(normalizedServings) if normalizedServings else data.get(\"\
          servingSize\", 2)\n    data.setdefault(\"difficulty\", \"EASY\")\n    data.setdefault(\"\
          ingredients\", [])\n    data.setdefault(\"prepTips\", [])\n    data.setdefault(\"\
          timelineSteps\", [])\n\n    # difficulty 校正\n    if data[\"difficulty\"\
          ] not in [\"EASY\", \"MEDIUM\", \"HARD\"]:\n        data[\"difficulty\"\
          ] = \"EASY\"\n\n    # timelineSteps 修复\n    fixed_steps = []\n    offset\
          \ = 0\n\n    for i, step in enumerate(data[\"timelineSteps\"], start=1):\n\
          \        if not isinstance(step, dict):\n            continue\n\n      \
          \  title = step.get(\"title\", f\"步骤{i}\")\n        instruction = step.get(\"\
          instruction\", \"\")\n        voice_text = step.get(\"voiceText\") or instruction\n\
          \        step_type = step.get(\"type\", \"auto\")\n        heat_level =\
          \ step.get(\"heatLevel\", \"OFF\")\n        need_confirm = bool(step.get(\"\
          needUserConfirm\", False))\n\n        try:\n            duration = int(step.get(\"\
          duration\", 0))\n        except:\n            duration = 0\n\n        if\
          \ duration < 0:\n            duration = 0\n\n        # 默认时长补齐\n        if\
          \ duration == 0:\n            if \"准备\" in title or \"切\" in instruction\
          \ or \"备料\" in title:\n                duration = 180\n            elif\
          \ \"热锅\" in title or \"下油\" in instruction:\n                duration =\
          \ 30\n            elif \"翻炒\" in title or \"炒\" in instruction:\n      \
          \          duration = 120\n            elif \"收汁\" in title:\n         \
          \       duration = 90\n            elif \"装盘\" in title or \"出锅\" in instruction:\n\
          \                duration = 45\n            else:\n                duration\
          \ = 60\n\n        # type / confirm 对齐\n        if need_confirm and step_type\
          \ != \"confirm\":\n            step_type = \"confirm\"\n\n        if step_type\
          \ not in [\"auto\", \"wait\", \"confirm\"]:\n            step_type = \"\
          auto\"\n\n        if heat_level not in [\"HIGH\", \"MEDIUM\", \"LOW\", \"\
          OFF\"]:\n            heat_level = \"OFF\"\n\n        fixed_steps.append({\n\
          \            \"stepNo\": i,\n            \"type\": step_type,\n        \
          \    \"title\": title,\n            \"instruction\": instruction,\n    \
          \        \"voiceText\": voice_text,\n            \"timeOffset\": offset,\n\
          \            \"duration\": duration,\n            \"heatLevel\": heat_level,\n\
          \            \"needUserConfirm\": need_confirm\n        })\n\n        offset\
          \ += duration\n\n    data[\"timelineSteps\"] = fixed_steps\n    data[\"\
          totalDuration\"] = sum(step[\"duration\"] for step in fixed_steps)\n\n \
          \   return {\n        \"structured_result\": data\n    }"
        code_language: python3
